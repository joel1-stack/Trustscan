{% extends 'base.html' %}
{% block title %}Scan Domain — TrustScan{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center p-4" style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);">
    <div class="w-full max-w-2xl">
        <div class="text-center mb-10">
            <h1 class="heading text-4xl md:text-5xl font-extrabold text-white">Scan a Domain</h1>
            <p class="text-gray-400 mt-3 text-lg">Enter any domain to analyze its digital trust posture</p>
        </div>
        <div class="bg-white/5 backdrop-blur-xl rounded-3xl p-8 md:p-10 border border-white/10 shadow-2xl">
            <form method="post" id="scanForm" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Domain Name</label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        </div>
                        <input type="text" name="domain" required placeholder="example.com" class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-gray-500 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 outline-none transition-all text-lg font-medium">
                    </div>
                    <p class="text-gray-500 text-sm mt-2">Enter a root domain (e.g. google.com, github.com)</p>
                </div>
                <button type="submit" id="scanBtn" class="w-full py-4 rounded-2xl bg-gradient-to-r from-blue-600 to-purple-600 text-white font-semibold text-lg hover:shadow-2xl hover:shadow-blue-500/25 transition-all flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
                    Start Scan
                </button>
            </form>
        </div>
        <div class="mt-8 grid grid-cols-3 gap-4 text-center">
            <div class="bg-white/5 rounded-2xl p-4 border border-white/10">
                <p class="heading text-2xl font-bold text-white">7</p>
                <p class="text-gray-400 text-sm">Engines</p>
            </div>
            <div class="bg-white/5 rounded-2xl p-4 border border-white/10">
                <p class="heading text-2xl font-bold text-white">13</p>
                <p class="text-gray-400 text-sm">Layers</p>
            </div>
            <div class="bg-white/5 rounded-2xl p-4 border border-white/10">
                <p class="heading text-2xl font-bold text-white">60s</p>
                <p class="text-gray-400 text-sm">Avg Scan</p>
            </div>
        </div>
    </div>
</div>
<script>
document.getElementById('scanForm')?.addEventListener('submit', function() {
    const btn = document.getElementById('scanBtn');
    btn.disabled = true;
    btn.innerHTML = '<svg class="animate-spin w-5 h-5" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg> Scanning...';
});
</script>
{% endblock %}
