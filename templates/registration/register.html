{% extends 'base.html' %}
{% block title %}Create Account - TrustScan{% endblock %}
{% block content %}
<style>
  .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #0f2440 50%, #0a1628 100%); }
  .input-glow:focus { box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
</style>
<section class="min-h-screen flex">
  <div class="hidden lg:flex lg:w-1/2 gradient-bg items-center justify-center p-12">
    <div class="text-white max-w-md">
      <h1 class="text-4xl font-bold">Start protecting your digital business</h1>
      <p class="mt-4 text-gray-300 text-lg">Get your free Trust Score in minutes. No credit card required.</p>
    </div>
  </div>
  <div class="w-full lg:w-1/2 flex items-center justify-center p-8">
    <div class="w-full max-w-sm">
      <h2 class="text-2xl font-bold text-gray-900 mb-8">Create Account</h2>
      <form method="POST" class="space-y-5">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
          <input type="text" name="name" required
                 class="w-full rounded-xl border border-gray-300 px-4 py-3 input-glow focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                 placeholder="John Kamau">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input type="email" name="email" required
                 class="w-full rounded-xl border border-gray-300 px-4 py-3 input-glow focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                 placeholder="you@example.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <input type="password" name="password1" required minlength="8"
                 class="w-full rounded-xl border border-gray-300 px-4 py-3 input-glow focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                 placeholder="At least 8 characters">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
          <input type="password" name="password2" required minlength="8"
                 class="w-full rounded-xl border border-gray-300 px-4 py-3 input-glow focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                 placeholder="Repeat your password">
        </div>
        <button type="submit" class="w-full py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold transition-colors">
          Create Account
        </button>
      </form>
      <p class="mt-6 text-center text-sm text-gray-500">
        Already have an account? <a href="/login/" class="text-blue-600 font-medium hover:text-blue-700">Sign in</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
