<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TrustScan - Digital Trust Intelligence Platform{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center gap-2">
                        <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                        <span class="text-xl font-bold text-gray-900">TrustScan</span>
                    </a>
                </div>
                <div class="flex items-center gap-4">
                    <a href="/scan/" class="text-gray-600 hover:text-gray-900 text-sm font-medium">Scan</a>
                    <a href="/api/docs/" class="text-gray-600 hover:text-gray-900 text-sm font-medium">API</a>
                    {% if user.is_authenticated %}
                    <a href="/dashboard/" class="text-gray-600 hover:text-gray-900 text-sm font-medium">Dashboard</a>
                    <a href="/logout/" class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium hover:bg-blue-700">Logout</a>
                    {% else %}
                    <a href="/login/" class="text-gray-600 hover:text-gray-900 text-sm font-medium">Sign In</a>
                    <a href="/register/" class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium hover:bg-blue-700">Get Started</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    {% if messages %}
    <div class="max-w-7xl mx-auto px-4 pt-4">
        {% for message in messages %}
        <div class="px-4 py-3 rounded-xl text-sm font-medium {% if message.tags == 'success' %}bg-green-50 text-green-700 border border-green-200{% elif message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200{% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="min-h-[calc(100vh-64px)]">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-100 py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-500 text-sm">
            <p>TrustScan — Map and protect your digital business</p>
            <p class="mt-1"><a href="https://trustscan.co.ke" class="text-blue-600 hover:underline">trustscan.co.ke</a></p>
        </div>
    </footer>
</body>
</html>
