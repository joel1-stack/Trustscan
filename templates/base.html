<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustScan - Digital Trust Intelligence Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center gap-2">
                        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f512.png" alt="TrustScan" class="w-8 h-8">
                        <span class="text-xl font-bold text-gray-900">TrustScan</span>
                    </a>
                </div>
                <div class="flex items-center gap-4">
                    <a href="/admin/" class="text-gray-600 hover:text-gray-900 text-sm font-medium">Admin</a>
                    <a href="/api/docs/" class="text-gray-600 hover:text-gray-900 text-sm font-medium">API Docs</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="min-h-[calc(100vh-64px)]">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-100 py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-500 text-sm">
            <p>TrustScan — Map and protect your digital business</p>
            <p class="mt-1"><a href="https://trustscan.co.ke" class="text-blue-600 hover:underline">trustscan.co.ke</a></p>
        </div>
    </footer>
</body>
</html>
